<style>
  :root {
    --width: 800px;
    --font-main: Verdana, sans-serif;
    --font-secondary: Verdana, sans-serif;
    --font-scale: 1em;
    --background-color: #fff;
    --heading-color: #222;
    --text-color: #444;
    --link-color: #1b54ac;
    --visited-color: #8b6fcb;
    --code-background-color: #f2f2f2;
    --code-color: #222;
    --blockquote-color: #222;

    --highligh-syntax-keyword: #ff7b72;
    --highligh-syntax-comment: #8b949e;
    --highligh-syntax-identifier: #79c0ff;
    --highligh-syntax-strong-identifier: #ff7b72;
    --highligh-syntax-special-identifier: #d2a8ff;
    --highligh-syntax-glyph: #839496;
    --highligh-syntax-literal: #beb55b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background-color: #000;
      --heading-color: #fff;
      --text-color: #fff;
      --link-color: #8cc2dd;
      --visited-color: #8b6fcb;
      --code-background-color: #000;
      --code-color: #ddd;
      --blockquote-color: #ccc;
    }
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  p a {
    text-decoration: underline;
  }

  span a {
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  nav span.active {
    font-weight: bold;
    margin-right: 10px;
  }
  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  main {
    line-height: 1.6;
  }

  table {
    width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 100%;
    min-width: 30%;
    display: block;
    margin: auto;
    filter: invert(89%) hue-rotate(180deg);
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  pre code {
    background-color: var(--code-background-color);
    color: var(--code-color);
    display: block;
    padding: 20px;
    white-space: pre-wrap;
    font-size: 0.875rem;
    overflow-x: auto;
  }

  code {
    font-family: monospace;
    padding: 2px;
    background-color: var(--code-background-color);
    color: var(--code-color);
    border-radius: 3px;
  }

  code span .giallo-ln {
    padding-right: 8px;
  }

  blockquote {
    border-left: 1px solid #999;
    color: var(--code-color);
    padding-left: 20px;
    font-style: italic;
  }

  div.changelog {
    margin-top: 32px;
  }

  div.changelog p {
    font-size: 15.75px;
    font-weight: 700;
  }

  div.changelog ul {
    list-style-type: none;
    padding-inline-start: 0;
  }

  div.changelog time {
    margin-right: 8px;
  }

  footer {
    padding: 25px 0;
    text-align: center;
  }

  .title a:hover {
    text-decoration: none;
  }

  .title {
    font-size: 1.5em;
  }

  .title a {
    color: var(--heading-color);
  }

  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    padding: 1px 15px;
    background-color: var(--code-background-color);
    color: var(--code-color);
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  pre.ascii {
    line-height: 1;
    text-align: center;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

  .tags,
  .tags nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem 0.75rem;
    font-size: smaller;
  }

  /* fold */
  details.fold {
    border: 1px solid #aaa;
    border-radius: 4px;
    padding: 0.5em 0.5em 0;
  }

  details.fold [open] {
    padding: 0.5em;
  }

  details.fold summary {
    margin: -0.5em -0.5em 0;
    padding: 0.5em;
  }

  details.fold summary p {
    display: inline;
  }

  details[open].fold summary {
    border-bottom: 1px solid #aaa;
    margin-bottom: 0.5em;
  }

  code span.keyword {
    color: var(--highligh-syntax-keyword);
  }

  code span.identifier {
    color: var(--highligh-syntax-identifier);
  }

  code span.strong-identifier {
    color: var(--highligh-syntax-strong-identifier);
  }

  code span.special-identifier {
    color: var(--highligh-syntax-special-identifier);
  }

  code span.glyph {
    color: var(--highligh-syntax-glyph);
  }

  code span.literal {
    color: var(--highligh-syntax-literal);
  }

  code span.comment {
    color: var(--highligh-syntax-comment);
  }

  section.footnotes {
    border-top: 1px dashed #aaa;
  }
</style>

{% extends "base.html" %}

{% block content %}
{{ section.content | safe }}
<ul class="blog-posts">
    {% for page in section.pages %}
    <li>
        <span>{% include "components/datetime.html" %}</span>
        <a href="{{ page.permalink }}">{{ page.title }}</a>
    </li>
    {% else %}
    <li>No posts yet.</li>
    {% endfor %}
</ul>
{% endblock %}
